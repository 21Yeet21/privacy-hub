server:
    # Listen on all interfaces, port 5333
    interface: 0.0.0.0
    port: 5333
    access-control: 10.8.0.0/24 allow    
    # Privacy & Security settings
    do-ip4: yes
    do-udp: yes
    do-tcp: yes
    do-ip6: no
    prefer-ip6: no
    
    # Hide identity and version
    hide-identity: yes
    hide-version: yes
    
    # QNAME Minimization (RFC 7858) - Hides what you are looking up from root servers
    qname-minimisation: yes
    aggressive-nsec: yes
    minimal-responses: yes
    
    # Disable logging for privacy & performance
    verbosity: 0
    use-syslog: no

